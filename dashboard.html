<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANICADE TECH | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .welcome-card {
            background: rgba(31, 46, 61, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .welcome-card h1 {
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: rgba(11, 28, 45, 0.6);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid var(--electric);
        }
        
        .stat-card h3 {
            color: var(--gray);
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 36px;
            color: var(--electric);
            font-weight: bold;
        }
        
        .logout-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .logout-btn:hover {
            background: #ff3333;
            box-shadow: 0 0 20px var(--red);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- ANIMATED RINGS -->
    <div class="rings-background">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>
    </div>
    
    <div class="dashboard-container">
        <div class="welcome-card">
            <h1>Welcome back, <span id="usernameDisplay"></span>! 👋</h1>
            <p>Your ANICADE TECH dashboard</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Active Services</h3>
                    <div class="stat-number">3</div>
                </div>
                <div class="stat-card">
                    <h3>Commission Earned</h3>
                    <div class="stat-number">K2,450</div>
                </div>
                <div class="stat-card">
                    <h3>Referrals</h3>
                    <div class="stat-number">12</div>
                </div>
                <div class="stat-card">
                    <h3>Pending Tasks</h3>
                    <div class="stat-number">2</div>
                </div>
            </div>
            
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" class="btn secondary-btn">← Back to Home</a>
        </div>
    </div>
    
    <script src="auth-check.js"></script>
    <script>
        // Display username
        document.getElementById('usernameDisplay').textContent = 
            localStorage.getItem('anicade_username') || 'User';
    </script>
</body>
</html>
